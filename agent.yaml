spec_version: "0.1.0"
name: clawitup
version: "0.2.0"
description: Git-native Red Team / Filter / Blue Team audit gate
model:
  preferred: "openai:gpt-4o-mini"
  fallback: []
tools:
  - cli
  - read
  - write
  - memory
runtime:
  max_turns: 50
skills:
  - orchestrate-audit
  - red-team-audit
  - verify-finding
  - blue-team-remediation
  - generate-ship-report
workflows:
  - workflows/adversarial-audit.yaml
hooks:
  - hooks/hooks.yaml
memory:
  shared: memory/shared
  teams: memory/teams
compliance:
  report_first: true
  raw_red_team_findings_do_not_fail_ci: true
