spec_version: "0.1.0"
name: clawitup
version: "1.0.1"
description: Git-native Red Team / Filter / Blue Team audit gate
# Model entries use provider:model strings and can mix providers.
# OpenAI models use OPENAI_API_KEY, OpenRouter uses OPENROUTER_API_KEY,
# and Anthropic uses ANTHROPIC_API_KEY or ANTHROPIC_OAUTH_TOKEN.
model:
  preferred: "openrouter:openai/gpt-oss-120b:free"
  fallback:
    - "openrouter:anthropic/claude-sonnet-4.5"
    - "anthropic:claude-sonnet-4-5-20250929"
tools:
  - read
  - list-files
  - git-diff
  - graphify
  - rg-search
  - run-tests
runtime:
  max_turns: 50
skills:
  - orchestrate-audit
  - run-context-gates
  - red-team-audit
  - verify-finding
  - blue-team-remediation
  - generate-ship-report
workflows:
  - workflows/adversarial-audit.yaml
hooks:
  - hooks/hooks.yaml
memory:
  shared: memory/shared
  teams: memory/teams
compliance:
  report_first: true
  raw_red_team_findings_do_not_fail_ci: true
